services:
  postgres:
    image: postgres:16-alpine
    container_name: proctorx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: proctorx
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - proctorx_pg:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d proctorx"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  proctorx_pg:
